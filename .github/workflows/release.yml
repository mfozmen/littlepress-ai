name: Release

# Manual-only. The original push-on-main trigger caused two cycles of
# bad auto-bumps: the push=false workaround skipped VCS release
# creation entirely (so tags and GitHub Releases never appeared), and
# an old `BREAKING CHANGE:` footer in the legacy-removal commit kept
# forcing every subsequent bump to v2.0.0. Switching to
# workflow_dispatch puts the version call back in a human's hands —
# trigger with `gh workflow run release.yml -f force=minor` (or major,
# patch, or empty for PSR's own calculation) from the Actions UI or
# the gh CLI when we actually want to cut a release.
on:
  workflow_dispatch:
    inputs:
      force:
        description: >-
          Force the bump level regardless of the commit history.
          Defaults to `minor` so the first dispatch in this repo
          doesn't re-trigger the stale BREAKING CHANGE footer that
          came with PR #38 (legacy build.py removal) and would
          otherwise push another major bump. Override only when
          you've intentionally staged a different level.
        required: false
        default: minor
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest
    if: github.repository == 'mfozmen/littlepress-ai'
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v9.15.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Let PSR push the bump commit, the tag, and cut the GitHub
          # Release in one go — no manual push step, no rebase-retry
          # dance. ``concurrency`` above already serialises release
          # runs, so the race the retry loop tried to defend against
          # can't happen.
          push: "true"
          force: ${{ inputs.force }}

      # No artifacts yet — PSR just bumps the version, writes
      # CHANGELOG.md, tags, and cuts a GitHub Release with the
      # auto-generated notes. The publish-action step is added back
      # when PyPI publishing (or another artifact target) lands.
