name: Release

# Automatic on every merge to main, with a manual-dispatch escape
# hatch for emergencies. PSR scans commits since the last tag (now
# v1.1.0) and bumps per Conventional Commits — feat → minor,
# fix/perf → patch, BREAKING CHANGE → major. The stale legacy-removal
# ``BREAKING CHANGE:`` footer from PR #38 sits behind v1.1.0 in
# history, so PSR will never see it again; future bumps stay in the
# 1.x line until a deliberate breaking change lands.
#
# If a bump needs to be forced (rare — e.g. cutting a prerelease),
# trigger manually: ``gh workflow run release.yml -f force=<level>``.
on:
  push:
    branches: [main]
    # PSR's own release commit touches CHANGELOG.md (and pyproject.toml
    # for the version bump). The ``[skip ci]`` tag in PSR's
    # ``commit_message`` already prevents a release → push → release
    # loop under ``GITHUB_TOKEN`` (Actions silently suppresses
    # workflow re-triggers from token-authored commits). This
    # ``paths-ignore`` on CHANGELOG.md is defense-in-depth: if auth
    # ever moves to a PAT — e.g. so the release can trigger a
    # downstream publish workflow — the GITHUB_TOKEN auto-suppression
    # goes away and only ``[skip ci]`` + this guard remain. We keep
    # ``pyproject.toml`` eligible so legitimate human edits (new
    # dependency, metadata change) still run the release scan.
    paths-ignore:
      - CHANGELOG.md
  workflow_dispatch:
    inputs:
      force:
        description: >-
          Force the bump level regardless of the commit history.
          Leave on the default (empty) to let PSR scan commits and
          pick the bump itself — safe now that v1.1.0 is tagged and
          the stale BREAKING CHANGE footer sits behind it. Pick a
          level explicitly only when you want to override PSR.
        required: false
        default: ""
        type: choice
        options:
          - ""
          - patch
          - minor
          - major
          - prerelease

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest
    if: github.repository == 'mfozmen/littlepress-ai'
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v9.15.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Let PSR push the bump commit, the tag, and cut the GitHub
          # Release in one go — no manual push step, no rebase-retry
          # dance. ``concurrency`` above already serialises release
          # runs, so the race the retry loop tried to defend against
          # can't happen.
          push: "true"
          force: ${{ inputs.force }}

      # No artifacts yet — PSR just bumps the version, writes
      # CHANGELOG.md, tags, and cuts a GitHub Release with the
      # auto-generated notes. The publish-action step is added back
      # when PyPI publishing (or another artifact target) lands.
